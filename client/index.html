<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EcoTrack | Carbon Footprint Logger</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav>
        <h1>EcoTrack</h1>
        <div id="auth-links">
            </div>
    </nav>

    <main class="dashboard">
        <section class="input-panel">
            <h2>Log New Activity</h2>
            <form id="log-form">
                <select id="category" required>
                    <option value="food">Food</option>
                    <option value="transport">Transport</option>
                    <option value="energy">Energy</option>
                </select>
                <input type="text" id="name" placeholder="Activity (e.g. Steak dinner)" required>
                <input type="number" id="value" placeholder="CO2 in kg" required>
                <button type="submit">Log Activity</button>
            </form>
        </section>

        <section class="visuals">
            <div class="stats-row">
                <div class="card">Total: <span id="total-val">0</span> kg</div>
                <div class="card">Avg: <span id="avg-val">25</span> kg</div>
            </div>
            <canvas id="mainChart"></canvas>
            <div class="filters">
                <button onclick="updateDisplay('all')">All</button>
                <button onclick="updateDisplay('food')">Food</button>
                <button onclick="updateDisplay('transport')">Transport</button>
            </div>
        </section>

        <section class="insights" id="insight-engine">
            <h3>Personalized Tips</h3>
            <p id="tip-text">Log an activity to see recommendations.</p>
        </section>
    </main>

    <script src="storage.js"></script>
    <script src="app.js"></script>
</body>
</html>
